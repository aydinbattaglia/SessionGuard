<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — SessionGuard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-page {
      max-width: 520px;
      margin: 60px auto;
      padding: 0 24px 80px;
    }
    .contact-page h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .contact-page .sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--mid);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      outline: none;
      color: var(--dark);
      background: #fff;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--blue);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    .form-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
    }
    #successMsg {
      display: none;
      padding: 16px 20px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      color: #15803d;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SessionGuard</a>
  <div class="nav-links">
    <a href="index.html#features">Features</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Support</a>
  </div>
</nav>

<div class="contact-page">
  <h1>Contact support</h1>
  <p class="sub">We typically reply within one business day.</p>

  <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="email">Your email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Topic</label>
      <select id="subject" name="subject" required>
        <option value="" disabled selected>Select a topic…</option>
        <option value="activation">Pro activation</option>
        <option value="billing">Billing / cancellation</option>
        <option value="bug">Something isn't working</option>
        <option value="refund">Refund request</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Describe your issue…" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">Send message</button>
    <p class="form-note">Your message goes directly to the SessionGuard team.</p>
  </form>

  <div id="successMsg">
    Message sent — we'll get back to you within one business day.
  </div>
</div>

<footer>
  <span>&copy; 2025 SessionGuard</span>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </div>
</footer>

<script>
  const form = document.getElementById('contactForm');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' },
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        throw new Error();
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Send message';
      alert('Something went wrong. Please try again.');
    }
  });
</script>

</body>
</html>
