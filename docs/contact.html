<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — SessionGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SessionGuard</a>
  <div class="nav-links">
    <a href="index.html#features">Features</a>
    <a href="contact.html">Support</a>
  </div>
</nav>

<div class="contact-page">
  <h1>Contact support</h1>
  <p class="sub">We typically reply within one business day.</p>

  <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="email">Your email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Topic</label>
      <select id="subject" name="subject" required>
        <option value="" disabled selected>Select a topic…</option>
        <option value="activation">Pro activation</option>
        <option value="billing">Billing / cancellation</option>
        <option value="bug">Something isn't working</option>
        <option value="refund">Refund request</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Describe your issue…" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="padding:12px;">Send message</button>
    <p class="form-note">Your message goes directly to the SessionGuard team.</p>
  </form>

  <div id="successMsg">
    Message sent — we'll get back to you within one business day.
  </div>
</div>

<footer>
  <span>&copy; 2025 SessionGuard</span>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </div>
</footer>

<script>
  const form = document.getElementById('contactForm');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' },
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        throw new Error();
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Send message';
      alert('Something went wrong. Please try again.');
    }
  });
</script>

</body>
</html>
