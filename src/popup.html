<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SessionGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <img src="../icons/icon16.png" width="16" height="16" alt="">
        <span>SessionGuard</span>
        <span class="beta-badge">Beta</span>
      </div>
      <label class="toggle" title="Enable / disable">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </header>

    <div id="platformSection" class="platform-section hidden">
      <div class="status-row">
        <span id="statusDot" class="dot"></span>
        <span id="platformName" class="platform-name"></span>
        <span id="lastKeepalive" class="ts"></span>
      </div>
      <div id="sessionsKept" class="sessions-kept"></div>
    </div>

    <div id="idleSection" class="idle-section">
      Open Westlaw, LexisNexis, Bloomberg Law, or PACER to activate SessionGuard.
    </div>

    <div class="interval-row">
      <label for="intervalSlider">
        Interval: <strong id="intervalVal">8</strong>&thinsp;min
      </label>
      <input type="range" id="intervalSlider" min="3" max="15" step="1" value="8">
    </div>

    <div id="upgradeNotice" class="upgrade-notice hidden">
      <strong>Pro coming soon</strong> — LexisNexis, Bloomberg Law &amp; PACER keepalive will be available in the full release.
      <a href="#" class="activate-toggle" id="activateToggle">Already subscribed? Activate →</a>
    </div>

    <div id="activateSection" class="activate-section hidden">
      <div class="activate-row">
        <input type="email" id="activateEmail" placeholder="you@example.com">
        <button id="activateBtn">Activate</button>
      </div>
      <div id="activateMsg" class="activate-msg hidden"></div>
    </div>

    <div id="proSection" class="pro-section hidden">
      <span class="pro-badge">PRO</span>
      <span class="pro-label">All platforms unlocked</span>
      <a href="#" id="manageLink" class="manage-link">Manage →</a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
